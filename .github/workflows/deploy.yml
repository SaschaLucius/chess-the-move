name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the scopes needed by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel any in-progress run when a new
# push lands on main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # The Vite config already sets base: '/chess-the-move/' so the output
        # is ready for Pages under that subpath without any extra env vars.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
