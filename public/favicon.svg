<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 2x2 chess board -->
  <rect x="0" y="0" width="16" height="16" fill="#b58863"/>
  <rect x="16" y="0" width="16" height="16" fill="#f0d9b5"/>
  <rect x="0" y="16" width="16" height="16" fill="#f0d9b5"/>
  <rect x="16" y="16" width="16" height="16" fill="#b58863"/>
  <!-- Question mark -->
  <text x="16" y="23"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-weight="bold"
        fill="white"
        stroke="#2d1a0e"
        stroke-width="2"
        paint-order="stroke">?</text>
</svg>
